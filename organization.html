<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Organization Profile | Agroforestry Carbon Field Guide</title>
  <style>
    :root {
      --bg: #f6f1e6;
      --bg-soft: #fbf7ee;
      --ink: #14221a;
      --muted: #667365;
      --green: #123b2a;
      --green-2: #1f6a46;
      --lime: #b9f06b;
      --clay: #c56f47;
      --cream: #fffaf0;
      --line: rgba(20, 34, 26, 0.13);
      --card: rgba(255, 250, 240, 0.72);
      --shadow: 0 24px 80px rgba(28, 43, 31, 0.14);
      --radius-lg: 26px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% -8%, rgba(185, 240, 107, 0.42), transparent 36rem),
        radial-gradient(circle at 96% 8%, rgba(197, 111, 71, 0.18), transparent 34rem),
        linear-gradient(180deg, var(--bg-soft), var(--bg));
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

    .nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(246, 241, 230, 0.76);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .nav-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 820;
      letter-spacing: -0.035em;
    }

    .brand-mark {
      width: 36px;
      height: 36px;
      border-radius: 13px;
      background:
        radial-gradient(circle at 34% 28%, var(--lime), transparent 28%),
        conic-gradient(from 150deg, var(--green), var(--green-2), #74ad55, var(--green));
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.48), 0 10px 24px rgba(18, 59, 42, 0.22);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--ink); }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 54px 24px 96px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 13px;
      margin-bottom: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 250, 240, 0.68);
      color: var(--green);
      font-size: 13px;
      font-weight: 820;
    }

    .profile-shell {
      display: grid;
      grid-template-columns: minmax(0, 0.92fr) minmax(340px, 0.48fr);
      gap: 18px;
      align-items: start;
    }

    .hero-card {
      min-height: 470px;
      padding: 34px;
      border-radius: 38px;
      background:
        radial-gradient(circle at 83% 14%, rgba(185, 240, 107, 0.22), transparent 18rem),
        linear-gradient(145deg, rgba(18, 59, 42, 0.98), rgba(28, 82, 52, 0.94));
      color: var(--cream);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      width: 360px;
      height: 360px;
      right: -110px;
      bottom: -150px;
      border-radius: 999px;
      border: 1px solid rgba(255, 250, 240, 0.14);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 250, 240, 0.11);
      border: 1px solid rgba(255, 250, 240, 0.16);
      color: var(--lime);
      font-size: 13px;
      font-weight: 820;
      width: fit-content;
    }

    h1 {
      margin: 24px 0 18px;
      max-width: 760px;
      font-size: clamp(54px, 8vw, 104px);
      line-height: 0.86;
      letter-spacing: -0.08em;
    }

    .lede {
      margin: 0;
      max-width: 680px;
      color: rgba(255, 250, 240, 0.72);
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.45;
    }

    .hero-actions {
      margin-top: 32px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 16px;
      border-radius: 999px;
      background: var(--lime);
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
    }

    .button.secondary {
      background: rgba(255, 250, 240, 0.12);
      color: var(--cream);
      border: 1px solid rgba(255, 250, 240, 0.18);
    }

    .side-card, .section-card, .related-card, .source-card {
      border-radius: var(--radius-lg);
      background: var(--card);
      border: 1px solid rgba(20, 34, 26, 0.1);
      box-shadow: 0 16px 46px rgba(28, 43, 31, 0.08);
    }

    .side-card {
      padding: 24px;
      position: sticky;
      top: 92px;
    }

    .facts { display: grid; gap: 14px; }

    .fact {
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }

    .fact:last-child { border-bottom: 0; padding-bottom: 0; }

    .fact b {
      display: block;
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .fact span {
      display: block;
      color: var(--muted);
      line-height: 1.35;
      font-weight: 700;
    }

    .section-stack {
      margin-top: 18px;
      column-count: 3;
      column-gap: 16px;
    }

    .section-card {
      display: inline-block;
      width: 100%;
      min-height: 0;
      margin: 0 0 16px;
      padding: 24px;
      break-inside: avoid;
    }

    .section-card.wide,
    .section-card.full { grid-column: auto; }

    .section-card h2 {
      margin: 0 0 12px;
      font-size: 26px;
      line-height: 0.98;
      letter-spacing: -0.045em;
    }

    .section-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 15px;
    }

    .chips, .list-pills {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip, .pill-link {
      padding: 7px 9px;
      border-radius: 999px;
      background: rgba(20, 34, 26, 0.06);
      color: var(--green);
      font-size: 12px;
      font-weight: 760;
    }

    .pill-link:hover { background: rgba(18, 59, 42, 0.12); }

    .project-list {
      margin-top: 18px;
      display: grid;
      gap: 9px;
    }

    .project-item {
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(20, 34, 26, 0.06);
      color: var(--green);
      font-size: 13px;
      font-weight: 820;
      line-height: 1.25;
    }

    .source-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .inline-sources {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      display: grid;
      gap: 6px;
    }

    .inline-sources b {
      color: var(--green);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .inline-sources a,
    .inline-sources span {
      color: var(--clay);
      font-size: 11px;
      font-weight: 780;
      line-height: 1.25;
    }

    .inline-sources a::before {
      content: "↗ ";
      color: rgba(197, 111, 71, 0.62);
    }

    .resource-kind {
      display: inline-flex;
      align-items: center;
      margin-left: 5px;
      padding: 1px 5px;
      border-radius: 999px;
      background: rgba(20, 34, 26, 0.06);
      color: var(--muted);
      font-size: 8px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      vertical-align: 1px;
    }

    .source-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 16px 18px;
      box-shadow: none;
      background: rgba(255, 250, 240, 0.55);
      color: var(--green);
      font-size: 14px;
      font-weight: 820;
    }

    .source-card span:last-child {
      color: var(--clay);
      white-space: nowrap;
    }

    .reference-card {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .reference-meta {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
    }

    .reference-type {
      padding: 6px 8px;
      border-radius: 999px;
      background: rgba(18, 59, 42, 0.08);
      color: var(--green);
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }


    .comparison {
      margin-top: 18px;
      border-radius: 34px;
      background: rgba(255, 250, 240, 0.72);
      border: 1px solid rgba(20, 34, 26, 0.1);
      box-shadow: 0 16px 46px rgba(28, 43, 31, 0.08);
      overflow: hidden;
    }

    .comparison-head {
      padding: 24px;
      border-bottom: 1px solid var(--line);
    }

    .comparison-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .comparison-head p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.4;
      max-width: 680px;
    }

    .comparison-table {
      display: grid;
    }

    .comparison-row {
      display: grid;
      grid-template-columns: 170px repeat(2, minmax(0, 1fr));
      border-bottom: 1px solid var(--line);
    }

    .comparison-row:last-child { border-bottom: 0; }

    .comparison-row > div {
      padding: 16px 18px;
      color: var(--muted);
      line-height: 1.35;
      font-size: 14px;
    }

    .comparison-row > div:first-child {
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      background: rgba(20, 34, 26, 0.035);
    }

    .comparison-name {
      color: var(--ink) !important;
      font-weight: 880;
      font-size: 16px !important;
      letter-spacing: -0.02em;
    }


    .similarity {
      margin-top: 18px;
      border-radius: 34px;
      background: rgba(255, 250, 240, 0.72);
      border: 1px solid rgba(20, 34, 26, 0.1);
      box-shadow: 0 16px 46px rgba(28, 43, 31, 0.08);
      padding: 24px;
    }

    .similarity-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .similarity-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .similarity-head a {
      color: var(--clay);
      font-size: 13px;
      font-weight: 900;
      white-space: nowrap;
    }

    .similarity-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .similarity-card {
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 250, 240, 0.56);
      border: 1px solid rgba(20, 34, 26, 0.08);
    }

    .similarity-card strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 20px;
      letter-spacing: -0.04em;
    }

    .similarity-score {
      display: inline-flex;
      margin-bottom: 10px;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(185, 240, 107, 0.28);
      color: var(--green);
      font-size: 12px;
      font-weight: 900;
    }

    .similarity-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .related { margin-top: 18px; }

    .related-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    .related-head h2 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    .related-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .related-card {
      padding: 20px;
      transition: transform 180ms ease, background 180ms ease;
    }

    .related-card:hover {
      transform: translateY(-3px);
      background: rgba(255, 250, 240, 0.92);
    }

    .related-card small {
      color: var(--clay);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .related-card h3 {
      margin: 14px 0 7px;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.045em;
    }

    .related-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
    }

    .empty {
      padding: 34px;
      border-radius: 34px;
      background: rgba(255, 250, 240, 0.74);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    footer {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 24px 42px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 980px) {
      .profile-shell { grid-template-columns: 1fr; }
      .section-stack { column-count: 2; }
      .section-card.wide,
      .section-card.full { grid-column: auto; }
      .side-card { position: static; }
      .related-grid,
      .similarity-grid { grid-template-columns: repeat(2, 1fr); }
      .comparison-row { grid-template-columns: 1fr; }
      .comparison-row > div:first-child { border-bottom: 1px solid var(--line); }
    }

    @media (max-width: 720px) {
      main { padding-top: 36px; }
      .nav-links { display: none; }
      .hero-card { min-height: auto; padding: 26px; }
      .section-stack { column-count: 1; }
      .related-grid,
      .similarity-grid { grid-template-columns: 1fr; }
      .source-card { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html" aria-label="Agroforestry Carbon Field Guide home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>Agroforestry Carbon Field Guide</span>
      </a>
      <div class="nav-links" aria-label="Profile navigation">
        <a class="active" href="organizations.html">Organizations</a>
        <a href="compare.html">Compare</a>
      </div>
    </div>
  </nav>

  <main id="app">
    <div class="empty">Loading organization profile...</div>
  </main>

  <footer>
    Profiles are generated from <code>data/organizations.json</code>. One template, many organizations.
  </footer>

  <script>
    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const requestedId = params.get("id") || "";

    function slugify(value) {
      return value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>'"]/g, character => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "'": "&#039;",
        '"': "&quot;"
      }[character]));
    }

    function hasText(value) {
      return Boolean(String(value || "").trim());
    }

    function hasItems(value) {
      return Array.isArray(value) && value.length > 0;
    }

    function profileUrl(org) {
      return `organization.html?id=${org.slug || slugify(org.name)}`;
    }

    function sourceTitle(source) {
      return typeof source === "string" ? source : source.title || source.label || source.url;
    }

    function sourceOrg(source) {
      return typeof source === "string" ? "" : source.organization || "";
    }

    function sourceUrl(source) {
      return typeof source === "string" ? "" : source.url || "";
    }

    function sourceKey(source) {
      return sourceUrl(source) || sourceTitle(source);
    }

    function sourceType(source) {
      if (typeof source !== "string" && source.type) return source.type;
      const text = [sourceTitle(source), sourceOrg(source), sourceUrl(source)].join(" ").toLowerCase();
      if (text.includes("framework") || text.includes("methodolog")) return "Methodology";
      if (text.includes("faq")) return "Company FAQ";
      if (text.includes("design document") || text.endsWith(".pdf")) return "PDF";
      if (text.includes("project") || text.includes("farm africa") || text.includes("solidaridad")) return "Project";
      if (text.includes("fsd africa") || text.includes("rabo foundation")) return "Finance";
      if (text.includes("satelligence")) return "Technology";
      return "Website";
    }

    function resourceKind(source) {
      if (typeof source !== "string" && source.kind) return source.kind;
      const type = sourceType(source).toLowerCase();
      const text = [sourceTitle(source), sourceUrl(source)].join(" ").toLowerCase();
      if (text.includes(".pdf") || text.includes("framework") || text.includes("design document") || type.includes("pdf")) return "PDF";
      if (text.includes("registry") || type.includes("registry")) return "Registry";
      if (type.includes("report")) return "Report";
      if (type.includes("methodology")) return "Methodology";
      return "Web";
    }

    function sourceLabel(source) {
      const title = sourceTitle(source);
      return `${escapeHtml(title)} <span class="resource-kind">${escapeHtml(resourceKind(source))}</span>`;
    }

    function projectList(items) {
      return (items || []).map(item => `<div class="project-item">${escapeHtml(item)}</div>`).join("");
    }

    function chipList(items) {
      return (items || []).map(item => `<span class="chip">${escapeHtml(item)}</span>`).join("");
    }

    function findOrganizationByName(name, organizations) {
      const normalize = value => String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, " ")
        .trim();
      const normalized = normalize(name);
      return organizations.find(item => normalize(item.name) === normalized);
    }

    function pillList(items, organizations = []) {
      return (items || []).map(item => {
        const linkedOrg = findOrganizationByName(item, organizations);
        if (linkedOrg) {
          return `<a class="pill-link" href="${profileUrl(linkedOrg)}">${escapeHtml(item)}</a>`;
        }
        return `<span class="chip">${escapeHtml(item)}</span>`;
      }).join("");
    }

    function sourceMatches(source, keywords) {
      const text = [sourceTitle(source), sourceOrg(source), sourceUrl(source)].join(" ").toLowerCase();
      return (keywords || []).some(keyword => text.includes(String(keyword).toLowerCase()));
    }

    function sourceSupportsSection(source, sectionName) {
      if (typeof source === "string" || !Array.isArray(source.sections)) return false;
      return source.sections.includes(sectionName);
    }

    function getInlineSources(sources, keywords, usedSourceKeys, sectionName = "") {
      const sectionMatches = (sources || []).filter(source => sourceSupportsSection(source, sectionName));
      const keywordMatches = (sources || []).filter(source => sourceMatches(source, keywords));
      const matches = sectionMatches.length ? sectionMatches : keywordMatches;
      const unique = [];
      matches.forEach(source => {
        const key = sourceKey(source);
        if (!usedSourceKeys.has(key)) {
          usedSourceKeys.add(key);
          unique.push(source);
        }
      });
      return unique;
    }

    function inlineSources(sourceItems) {
      if (!sourceItems.length) return "";
      return `
        <div class="inline-sources">
          <b>References</b>
          ${sourceItems.map(source => {
            const title = sourceTitle(source);
            const url = sourceUrl(source);
            if (!url) return `<span>${sourceLabel(source)}</span>`;
            return `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${sourceLabel(source)}</a>`;
          }).join("")}
        </div>
      `;
    }

    function referenceList(sources) {
      return (sources || []).map(source => {
        const title = sourceTitle(source);
        const organization = sourceOrg(source);
        const url = sourceUrl(source);
        const type = sourceType(source);
        const body = `
          <span>
            ${escapeHtml(title)}
            ${organization ? `<span class="reference-meta">${escapeHtml(organization)}</span>` : ""}
          </span>
          <span class="reference-type">${escapeHtml(type)}</span>
        `;

        if (!url) return `<div class="source-card reference-card">${body}</div>`;
        return `<a class="source-card reference-card" href="${escapeHtml(url)}" target="_blank" rel="noopener">${body}</a>`;
      }).join("");
    }

    function referencesSection(org, usedSourceKeys) {
      const remaining = (org.sources || []).filter(source => !usedSourceKeys.has(sourceKey(source)));
      if (!remaining.length) return "";

      return `
        <section class="related" aria-label="References">
          <div class="related-head">
            <h2>References</h2>
          </div>
          <article class="section-card full">
            <p>Foundational references and additional verification sources for this profile.</p>
            <div class="source-list">${referenceList(remaining)}</div>
          </article>
        </section>
      `;
    }

    function researchSections(org, allOrganizations, usedSourceKeys) {
      const sections = [];

      sections.push(`
        <article class="section-card">
          <h2>Overview</h2>
          <p>${escapeHtml(org.description || org.overview)}</p>
        </article>
      `);

      if (hasText(org.businessModel)) {
        const sources = getInlineSources(org.sources, ["what we do", "impact report"], usedSourceKeys, "businessModel");
        sections.push(`
          <article class="section-card">
            <h2>Business model</h2>
            <p>${escapeHtml(org.businessModel)}</p>
            ${inlineSources(sources)}
          </article>
        `);
      }

      if (hasItems(org.representativeProjects)) {
        const sources = getInlineSources(org.sources, ["projects", "farm africa", "solidaridad", "design document"], usedSourceKeys, "representativeProjects");
        sections.push(`
          <article class="section-card">
            <h2>Representative projects</h2>
            <p>Named projects or project types connected to this organization. These are shown as project records, not organization links.</p>
            <div class="project-list">${projectList(org.representativeProjects)}</div>
            ${inlineSources(sources)}
          </article>
        `);
      }

      if (hasItems(org.partners)) {
        const sources = getInlineSources(org.sources, ["satelligence"], usedSourceKeys, "partners");
        sections.push(`
          <article class="section-card">
            <h2>Partners</h2>
            <p>Organizations connected to implementation, finance, certification, MRV, or delivery. Linked pills open profiles when available.</p>
            <div class="list-pills">${pillList(org.partners, allOrganizations)}</div>
            ${inlineSources(sources)}
          </article>
        `);
      }

      if (hasItems(org.standards)) {
        const sources = getInlineSources(org.sources, ["framework", "verra", "gold standard", "sustaincert", "vci"], usedSourceKeys, "standards");
        sections.push(`
          <article class="section-card">
            <h2>Standards</h2>
            <p>Standards, registries, or certification systems associated with the profile. Linked pills open profiles when available.</p>
            <div class="list-pills">${pillList(org.standards, allOrganizations)}</div>
            ${inlineSources(sources)}
          </article>
        `);
      }

      if (hasText(org.financingApproach)) {
        const sources = getInlineSources(org.sources, ["fsd africa"], usedSourceKeys, "financingApproach");
        sections.push(`
          <article class="section-card wide">
            <h2>Financing approach</h2>
            <p>${escapeHtml(org.financingApproach)}</p>
            ${inlineSources(sources)}
          </article>
        `);
      }

      return sections.join("");
    }


    function comparisonValue(org, key, fallback = "") {
      if (org.comparison && org.comparison[key]) return org.comparison[key];
      const fallbacks = {
        customer: org.roleLabel || fallback,
        primaryRevenue: org.businessModel || org.strategy || fallback,
        mainOffering: org.type || fallback,
        carbonRole: org.strategy || fallback,
        financing: org.financingApproach || fallback,
        typicalClient: hasItems(org.partners) ? org.partners.slice(0, 3).join(", ") : fallback
      };
      return fallbacks[key] || fallback;
    }

    function comparisonPartner(org, allOrganizations) {
      if (org.slug === "acorn") return allOrganizations.find(item => item.slug === "pur");
      if (org.slug === "pur") return allOrganizations.find(item => item.slug === "acorn");
      return allOrganizations.find(item => item.name !== org.name && item.role === org.role && item.comparison);
    }

    function renderComparison(org, allOrganizations) {
      const other = comparisonPartner(org, allOrganizations);
      if (!other) return "";

      const rows = [
        ["Customer", "customer"],
        ["Primary revenue", "primaryRevenue"],
        ["Main offering", "mainOffering"],
        ["Carbon model", "carbonRole"],
        ["Financing", "financing"],
        ["Typical client", "typicalClient"]
      ];

      return `
        <section class="comparison" aria-label="Organization comparison">
          <div class="comparison-head">
            <h2>${escapeHtml(org.name)} vs ${escapeHtml(other.name)}</h2>
            <p>A quick comparison to show why both organizations sit in the same role while showing where they are similar and where they diverge.</p>
          </div>
          <div class="comparison-table">
            <div class="comparison-row">
              <div></div>
              <div class="comparison-name">${escapeHtml(org.name)}</div>
              <div class="comparison-name">${escapeHtml(other.name)}</div>
            </div>
            ${rows.map(([label, key]) => `
              <div class="comparison-row">
                <div>${escapeHtml(label)}</div>
                <div>${escapeHtml(comparisonValue(org, key, "Not yet documented"))}</div>
                <div>${escapeHtml(comparisonValue(other, key, "Not yet documented"))}</div>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }


    const similarityDimensions = {
      carbonFirst: "Carbon-first",
      supplyChainFocus: "Supply-chain focus",
      technicalAssistance: "Technical assistance",
      farmerImplementation: "Farmer implementation",
      technologyMRV: "Technology / MRV",
      capitalProvision: "Capital provision",
      standardSetting: "Standard-setting",
      corporateDemand: "Corporate demand",
      restorationFocus: "Restoration focus",
      smallholderFocus: "Smallholder focus"
    };

    function similarityScore(org, other) {
      if (!org.similarityScores || !other.similarityScores) return null;
      const keys = Object.keys(similarityDimensions).filter(key =>
        typeof org.similarityScores[key] === "number" && typeof other.similarityScores[key] === "number"
      );
      if (!keys.length) return null;

      const maxDistance = Math.sqrt(keys.length * Math.pow(4, 2));
      const distance = Math.sqrt(keys.reduce((sum, key) =>
        sum + Math.pow(org.similarityScores[key] - other.similarityScores[key], 2), 0
      ));
      return Math.max(0, Math.round((1 - distance / maxDistance) * 100));
    }

    function topSimilarOrganizations(org, allOrganizations, count = 3) {
      return allOrganizations
        .filter(item => item.name !== org.name && item.similarityScores)
        .map(item => ({ ...item, score: similarityScore(org, item) }))
        .filter(item => item.score !== null)
        .sort((a, b) => b.score - a.score)
        .slice(0, count);
    }

    function strongestSharedTraits(org, other) {
      if (!org.similarityScores || !other.similarityScores) return "";
      return Object.keys(similarityDimensions)
        .filter(key => Math.abs(org.similarityScores[key] - other.similarityScores[key]) <= 1)
        .sort((a, b) => Math.max(other.similarityScores[b], org.similarityScores[b]) - Math.max(other.similarityScores[a], org.similarityScores[a]))
        .slice(0, 2)
        .map(key => similarityDimensions[key])
        .join(" + ");
    }

    function renderSimilarity(org, allOrganizations) {
      const similar = topSimilarOrganizations(org, allOrganizations, 3);
      if (!similar.length) return "";

      return `
        <section class="similarity" aria-label="Most similar organizations">
          <div class="similarity-head">
            <h2>Most similar organizations</h2>
            <a href="compare.html?id=${escapeHtml(org.slug || slugify(org.name))}">Open Compare →</a>
          </div>
          <div class="similarity-grid">
            ${similar.map(item => `
              <a class="similarity-card" href="${profileUrl(item)}">
                <strong>${escapeHtml(item.name)}</strong>
                <span class="similarity-score">${item.score}% similar</span>
                <p>${escapeHtml(strongestSharedTraits(org, item) || item.type || "Similar profile pattern")}</p>
              </a>
            `).join("")}
          </div>
        </section>
      `;
    }


    function renderRelated(org, allOrganizations) {
      const related = allOrganizations
        .filter(item => item.name !== org.name && item.role === org.role)
        .slice(0, 3);

      if (!related.length) return "";

      return `
        <section class="related">
          <div class="related-head">
            <h2>Comparable organizations</h2>
          </div>
          <div class="related-grid">
            ${related.map(item => `
              <a class="related-card" href="${profileUrl(item)}">
                <small>${escapeHtml(item.roleLabel)}</small>
                <h3>${escapeHtml(item.name)}</h3>
                <p>${escapeHtml(item.type)} · ${escapeHtml(item.strategy)}</p>
              </a>
            `).join("")}
          </div>
        </section>
      `;
    }

    function renderProfile(org, allOrganizations) {
      const usedSourceKeys = new Set();
      document.title = `${org.name} | Agroforestry Carbon Field Guide`;

      app.innerHTML = `
        <section class="profile-shell">
          <article class="hero-card">
            <div>
              <div class="eyebrow">${escapeHtml(org.roleLabel || "Organization profile")}</div>
              <h1>${escapeHtml(org.name)}</h1>
              <p class="lede">${escapeHtml(org.overview || org.description)}</p>
            </div>
            <div class="hero-actions">
              <a class="button" href="${escapeHtml(org.website)}" target="_blank" rel="noopener">Visit website →</a>
            </div>
          </article>

          <aside class="side-card" aria-label="Profile summary">
            <div class="facts">
              <div class="fact"><b>Primary role</b><span>${escapeHtml(org.roleLabel)}</span></div>
              <div class="fact"><b>Organization type</b><span>${escapeHtml(org.type)}</span></div>
              <div class="fact"><b>Headquarters</b><span>${escapeHtml(org.hq)}</span></div>
              <div class="fact"><b>Footprint</b><span>${escapeHtml(org.geography)}</span></div>
              <div class="fact"><b>Carbon model</b><span>${escapeHtml(org.strategy)}</span></div>
            </div>
          </aside>
        </section>

        <section class="section-stack" aria-label="Research profile sections">
          ${researchSections(org, allOrganizations, usedSourceKeys)}
        </section>

        ${renderComparison(org, allOrganizations)}
        ${renderSimilarity(org, allOrganizations)}
        ${renderRelated(org, allOrganizations)}
        ${referencesSection(org, usedSourceKeys)}
      `;
    }

    function renderNotFound(organizations) {
      app.innerHTML = `
        <section class="empty">
          <h1>Profile not found.</h1>
          <p>The requested organization profile does not exist in <code>data/organizations.json</code>.</p>
          <p><a class="back-link" href="organizations.html">Browse all organizations</a></p>
        </section>
      `;
      console.warn("Available organization IDs:", organizations.map(org => org.slug || slugify(org.name)));
    }

    fetch("data/organizations.json")
      .then(response => response.json())
      .then(organizations => {
        const normalizedId = requestedId.toLowerCase();
        const organization = organizations.find(org => (org.slug || slugify(org.name)) === normalizedId);
        if (!organization) {
          renderNotFound(organizations);
          return;
        }
        renderProfile(organization, organizations);
      })
      .catch(error => {
        console.error("Could not load organizations.json", error);
        app.innerHTML = `
          <section class="empty">
            <h1>Could not load profile data.</h1>
            <p>Check that <code>data/organizations.json</code> is published with this page.</p>
          </section>
        `;
      });
  </script>
</body>
</html>
